apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app
  labels:
    app: test-app-deployment
spec:
  selector:
    matchLabels:
      app: test-app
  replicas : 1
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: test-app
        image: docker.io/mukhulmenon/test-app:latest
        resources:
          limits:
            memory: "128Mi"
            cpu: "500m"
        ports:
        - containerPort: 5000
